kind = "web"
previewPath = "/"
title = "All-in-One Free Tools"
version = "1.0.0"
id = "artifacts/tools-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23447

[services.development]
run = "pnpm --filter @workspace/tools-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tools-website", "run", "build" ]
publicDir = "artifacts/tools-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23447"
BASE_PATH = "/"
